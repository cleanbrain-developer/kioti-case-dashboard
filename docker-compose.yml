name: kioti-case-dashboard

services:

  # ── Postfix SMTP relay (내부 메일 발송용) ────────────────────
  smtp:
    image: boky/postfix
    container_name: kioti-smtp
    restart: unless-stopped
    environment:
      HOSTNAME: mail.kiotitractor.com
      ALLOWED_SENDER_DOMAINS: kiotitractor.com
      RELAYHOST: ${SMTP_RELAYHOST:-}
      RELAYHOST_USERNAME: ${SMTP_RELAYHOST_USER:-}
      RELAYHOST_PASSWORD: ${SMTP_RELAYHOST_PASS:-}
    networks:
      - kioti-net

  # ── NestJS Backend ──────────────────────────────────────────
  backend:
    build: ./backend
    image: kioti-backend:latest
    container_name: kioti-backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kioti:${DB_PASSWORD:-kioti1234}@db:5432/kioti_dashboard
      SMTP_HOST: kioti-smtp
      SMTP_PORT: "25"
      SMTP_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
      smtp:
        condition: service_started
    restart: unless-stopped
    networks:
      - kioti-net

  # ── React Frontend (nginx) ───────────────────────────────────
  frontend:
    build: ./frontend
    image: kioti-frontend:latest
    container_name: kioti-frontend
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - kioti-net

  # ── PostgreSQL 16 ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kioti-db
    environment:
      POSTGRES_USER: kioti
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kioti1234}
      POSTGRES_DB: kioti_dashboard
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kioti -d kioti_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - kioti-net

volumes:
  postgres_data:
    name: kioti_postgres_data
    external: true   # pre-exists from prior deployment; managed outside Compose

networks:
  kioti-net:
    name: kioti-network
    external: true   # pre-exists from prior deployment; managed outside Compose
